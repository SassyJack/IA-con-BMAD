name: serenti
description: "Serenti: Salud Mental y Acompañamiento Empático"
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  bloc: ^9.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  equatable: ^2.0.7
  isar_database:
    path: packages/isar_database
  tflite_service:
    path: packages/tflite_service
  security_vault:
    path: packages/security_vault
  sensor_kit:
    path: packages/sensor_kit
  url_launcher: ^6.3.0

dev_dependencies:
  bloc_lint: ^0.4.0
  bloc_test: ^10.0.0
  bloc_tools: ^0.1.0-dev.23
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0

flutter:
  generate: true
  uses-material-design: true
